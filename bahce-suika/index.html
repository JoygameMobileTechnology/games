<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Bahçe Suika</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<style>
  :root{ --bg:#faf8ef; --panel:#bbada0; --text:#776e65;
         --font-round: ui-rounded, 'Arial Rounded MT Bold', 'Trebuchet MS', system-ui, sans-serif;
         --chip:#00000045; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ background:var(--bg); font-family:system-ui,-apple-system,sans-serif; color:var(--text);
        display:flex; flex-direction:column; align-items:center; overflow:hidden; touch-action:none; }
  #app{ width:min(100vw,480px); height:100%; display:flex; flex-direction:column; }

  /* Dünya Ağacı sahnesi */
  #tree-wrap{ position:relative; height:35%; min-height:195px; border-radius:0 0 18px 18px; overflow:hidden;
              transition:background 1.2s ease; }
  #tree-wrap.sky0{ background:linear-gradient(#c7e6f7 0%,#e8f4dc 55%,#bfe0a1 78%,#9cc878 100%); }
  #tree-wrap.sky1{ background:linear-gradient(#aedcf5 0%,#d8eec9 52%,#a9d485 78%,#87b964 100%); }
  #tree-wrap.sky2{ background:linear-gradient(#ffdfae 0%,#ffe9c4 40%,#b8d98a 75%,#8fbf68 100%); }
  #tree-wrap.sky3{ background:linear-gradient(#c4a7e0 0%,#f2c9a8 42%,#a3cf75 75%,#7fb654 100%); }
  #tree-svg{ position:absolute; inset:0; width:100%; height:100%; transform-origin:50% 95%; }
  #tree-wrap::after{ content:''; position:absolute; inset:0; pointer-events:none; z-index:7;
                     background:radial-gradient(ellipse at 50% 45%, transparent 58%, #00000014 100%); }
  #flash{ position:absolute; inset:0; background:#fff8d8; opacity:0; pointer-events:none; z-index:8; }
  /* ağacın rüzgar salınımı + nefes alan zemin gölgesi */
  #tree-sway{ transform-box:fill-box; transform-origin:50% 100%; animation:treesway 6.5s ease-in-out infinite alternate; }
  @keyframes treesway{ from{ transform:rotate(-1.1deg); } to{ transform:rotate(1.3deg); } }
  #tree-shadow{ transform-box:fill-box; transform-origin:center; animation:shadowsway 6.5s ease-in-out infinite alternate; }
  @keyframes shadowsway{ from{ transform:translateX(-1.4px); } to{ transform:translateX(1.6px) scaleX(1.05); } }
  .leaf.shimmer{ animation:leafshimmer ease-in-out infinite alternate; }
  @keyframes leafshimmer{ from{ opacity:.78; } to{ opacity:1; } }

  .sun{ position:absolute; top:22px; left:56%; width:32px; height:32px; border-radius:50%; z-index:1;
        background:radial-gradient(circle at 35% 35%,#fff6c9,#ffd95e 70%);
        animation:sunpulse 5s ease-in-out infinite alternate; }
  @keyframes sunpulse{ from{ box-shadow:0 0 20px #ffd95e66; } to{ box-shadow:0 0 36px #ffd95ecc; } }
  .cloud{ position:absolute; width:54px; height:16px; border-radius:10px; background:#ffffffd0; z-index:1;
          box-shadow:14px -6px 0 -2px #ffffffbb; animation:cross linear infinite; }
  @keyframes cross{ from{ left:-18%; } to{ left:104%; } }
  .firefly{ position:absolute; width:4px; height:4px; border-radius:50%; background:#fff8ae; z-index:6;
            box-shadow:0 0 8px 3px #ffe98288; animation:fly 7s ease-in-out infinite alternate; }
  @keyframes fly{ 0%{ transform:translate(0,0); opacity:.2; } 30%{ opacity:1; }
                  60%{ opacity:.35; } 100%{ transform:translate(34px,-26px); opacity:.9; } }
  .rays{ position:absolute; width:120px; height:120px; border-radius:50%; z-index:0; opacity:.45; pointer-events:none;
         background:repeating-conic-gradient(#ffe98200 0 13deg, #ffe98230 13deg 19deg);
         animation:spin 44s linear infinite; }
  @keyframes spin{ to{ rotate:360deg; } }
  .mist{ position:absolute; left:-10%; right:-10%; height:26px; border-radius:50%; background:#ffffff59;
         filter:blur(7px); z-index:2; animation:mistdrift 22s ease-in-out infinite alternate; }
  @keyframes mistdrift{ from{ transform:translateX(-14px); } to{ transform:translateX(18px); } }
  .star{ position:absolute; width:3px; height:3px; border-radius:50%; background:#fff; z-index:1;
         animation:twinkle ease-in-out infinite alternate; }
  @keyframes twinkle{ from{ opacity:.15; } to{ opacity:.95; } }
  .moon{ position:absolute; top:16px; left:60%; width:26px; height:26px; border-radius:50%; z-index:1;
         background:radial-gradient(circle at 62% 38%, #fffdf2, #e8e2c8 70%);
         box-shadow:0 0 18px #fffdf277, inset -5px -4px 0 #d8d2b855; }
  .flybird{ position:absolute; z-index:2; font-size:13px; pointer-events:none; animation:birdfly linear forwards; }
  @keyframes birdfly{ from{ left:-6%; } to{ left:104%; } }
  .fallleaf{ position:absolute; z-index:6; font-size:11px; pointer-events:none; animation:fall ease-in forwards; }
  @keyframes fall{ 0%{ translate:0 0; rotate:0deg; opacity:0; } 12%{ opacity:.9; }
                   100%{ translate:-28px 120px; rotate:150deg; opacity:0; } }
  .inhab{ position:absolute; z-index:5; line-height:1; filter:drop-shadow(0 2px 2px #0004);
          transform:translate(-50%,-50%); }
  .inhab.flutter{ animation:flutter 6s ease-in-out infinite alternate; }
  @keyframes flutter{ 0%{ translate:0 0; } 40%{ translate:22px -14px; } 100%{ translate:-12px -24px; } }
  .inhab.bob{ animation:bob 3.2s ease-in-out infinite alternate; }
  @keyframes bob{ from{ margin-top:0; } to{ margin-top:-4px; } }

  .chip{ position:absolute; z-index:9; background:var(--chip); border-radius:20px; padding:5px 12px; color:#fff;
         font-family:var(--font-round); font-weight:800; box-shadow:0 2px 6px #00000026;
         display:flex; align-items:center; gap:8px; }
  #energy-chip{ top:8px; left:8px; font-size:14px; }
  #energy-chip .bar{ width:88px; height:9px; background:#ffffff3d; border-radius:5px; overflow:hidden; }
  #energy-chip .bar i{ display:block; height:100%; background:linear-gradient(#d8ffa8,#8bd44a); border-radius:5px;
                       transition:width .35s ease; }
  #energy-chip.close .bar i{ animation:barglow .9s ease-in-out infinite alternate; }
  @keyframes barglow{ from{ filter:brightness(1); } to{ filter:brightness(1.5); } }
  #energy-chip .cnt{ font-size:12px; color:#d8ffa8; }
  #level-chip{ top:8px; right:8px; font-size:12.5px; }
  #next-chip{ top:42px; right:8px; font-size:11.5px; opacity:.95; }
  #legend-chip{ top:74px; right:8px; font-size:12px; display:none; }

  /* HUD */
  #hud{ display:flex; align-items:center; gap:8px; padding:6px 12px; font-family:var(--font-round); }
  #hud h1{ font-size:17px; margin-right:auto; }
  .score{ background:var(--panel); color:#fff; border-radius:8px; padding:3px 9px; font-size:11px; text-align:center; }
  .score b{ display:block; font-size:15px; }
  #next-wrap{ display:flex; align-items:center; gap:3px; }
  #next-wrap .nx-fruit{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
                        font-size:13px; box-shadow:inset 0 -2px 3px #0002; }
  #next-wrap .nx-fruit.small{ width:17px; height:17px; font-size:9px; opacity:.7; }
  #hud button{ border:0; border-radius:6px; background:#8f7a66; color:#fff; font-weight:700;
               padding:6px 10px; font-size:12px; cursor:pointer; }

  /* Kap */
  #cup-wrap{ flex:1; display:flex; align-items:flex-start; justify-content:center; padding-top:2px; }
  #cup{ position:relative; width:min(88vw,350px,44vh); aspect-ratio:100/130; overflow:hidden;
        background:linear-gradient(#f3e6c8,#e5d0a4 70%,#d8bf8e); border:3px solid #b89b6a; border-top:0;
        border-radius:0 0 26px 26px; box-shadow:inset 0 6px 14px #0000001a; }
  #danger{ position:absolute; left:0; right:0; border-top:2px dashed #d9453e88; z-index:3; pointer-events:none; }
  #cup.danger #danger{ animation:blink .5s steps(2) infinite; border-top-color:#d9453e; }
  @keyframes blink{ 50%{ opacity:.2; } }
  .fruit{ position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center;
          line-height:1; box-shadow:inset 0 -3px 6px #00000022, 0 2px 3px #00000026; z-index:2; will-change:transform; }
  .fruit.born{ animation:born 160ms cubic-bezier(.3,1.4,.5,1); }
  @keyframes born{ from{ scale:.2; } }
  .fruit.pop{ animation:fpop 180ms ease; }
  @keyframes fpop{ 45%{ scale:1.18; } }
  #aim{ position:absolute; top:0; bottom:0; width:0; border-left:2px dashed #b89b6a66; z-index:1; pointer-events:none; }
  #held{ position:absolute; z-index:4; border-radius:50%; display:flex; align-items:center; justify-content:center;
         box-shadow:inset 0 -3px 6px #00000022, 0 2px 4px #0003; pointer-events:none; }

  /* Enerji zerresi + patlama */
  .mote{ position:fixed; z-index:50; font-size:16px; pointer-events:none;
         filter:drop-shadow(0 0 7px #d8ffa8);
         transition:left .7s cubic-bezier(.3,-.3,.45,1), top .7s cubic-bezier(.2,.65,.35,1); }
  .mote.big{ font-size:26px; filter:drop-shadow(0 0 10px #ffe082) drop-shadow(0 0 20px #ffd95e88); }
  .mergeburst{ position:fixed; z-index:48; width:16px; height:16px; margin:-8px; border-radius:50%;
               border:3px solid #d8ffa8; pointer-events:none; animation:burst .45s ease-out forwards; }
  @keyframes burst{ from{ scale:.4; opacity:.95; } to{ scale:3.4; opacity:0; } }
  .spark{ position:absolute; z-index:7; font-size:14px; pointer-events:none; }

  /* Overlay */
  #overlay{ position:fixed; inset:0; background:#0007; display:none; align-items:center; justify-content:center; z-index:100; }
  #overlay.show{ display:flex; }
  #overlay .box{ background:var(--bg); border-radius:14px; padding:22px; max-width:320px; text-align:center;
                 font-family:var(--font-round); }
  #overlay .box h2{ font-size:18px; margin-bottom:10px; }
  #overlay .box p{ font-size:14px; margin-bottom:14px; }
  #overlay .box button{ border:0; border-radius:8px; background:#8f7a66; color:#fff; font-weight:700;
                        padding:10px 18px; font-size:14px; cursor:pointer; }

  #debug{ position:fixed; bottom:4px; left:4px; z-index:60; display:flex; gap:4px; flex-wrap:wrap; }
  #debug button{ font-size:10px; padding:3px 5px; }
</style>
</head>
<body>
<div id="app">
  <div id="tree-wrap" class="sky0">
    <svg id="tree-svg" viewBox="0 0 100 108" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="barkgrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#7d5a3c"/><stop offset=".55" stop-color="#9c7550"/><stop offset="1" stop-color="#6e4c31"/>
        </linearGradient>
        <radialGradient id="leafgrad" cx=".4" cy=".35" r=".8">
          <stop offset="0" stop-color="#a5d97e"/><stop offset="1" stop-color="#5f9e43"/>
        </radialGradient>
      </defs>
      <filter id="treeshadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0.7" dy="1.3" stdDeviation="0.9" flood-color="#2c4416" flood-opacity="0.3"/>
      </filter>
      <ellipse cx="50" cy="104" rx="46" ry="6" fill="#7aa855"/>
      <ellipse id="tree-shadow" cx="50" cy="105" rx="30" ry="4" fill="#00000016"/>
      <g id="tree-g"><g id="tree-sway" filter="url(#treeshadow)"></g></g>
    </svg>
    <div id="flash"></div>
    <span class="chip" id="energy-chip">🌱<span class="bar"><i id="energy-bar"></i></span><span class="cnt" id="energy-cnt"></span></span>
    <span class="chip" id="level-chip"></span>
    <span class="chip" id="next-chip"></span>
    <span class="chip" id="legend-chip"></span>
  </div>
  <div id="hud">
    <h1>Bahçe Suika</h1>
    <div id="next-wrap"><span class="nx-fruit" id="nx-cur"></span><span class="nx-fruit small" id="nx-next"></span></div>
    <div class="score">SKOR<b id="score">0</b></div>
    <div class="score">REKOR<b id="best">0</b></div>
    <button id="new-game">Yeni</button>
    <button id="mute">🔊</button>
  </div>
  <div id="cup-wrap"><div id="cup"><div id="aim"></div><div id="danger"></div><div id="held"></div></div></div>
</div>
<div id="overlay"><div class="box"><h2 id="ov-title"></h2><p id="ov-text"></p><button id="ov-btn">Devam</button></div></div>
<script>
/* CORE-START */
// --- Fizik dünyası (değişmedi) ---
const W = 100, H = 130;
const DANGER_Y = 20;
const TIERS = 11;
const GRAV = 320, DAMP = 0.35, FRICTION = 0.985, REST = 0.2;
const radius = t => 4.5 + t * 2.2;

function newWorld() { return { fruits: [], nextId: 1 }; }

function addFruit(w, tier, x, y) {
  const r = radius(tier);
  const f = { id: w.nextId++, tier,
    x: Math.max(r, Math.min(W - r, x)),
    y: y === undefined ? DANGER_Y - r - 2 : y,
    vx: 0, vy: 0 };
  w.fruits.push(f);
  return f;
}

function stepWorld(w, dt) {
  const merges = [];
  for (const f of w.fruits) {
    f.vy += GRAV * dt;
    f.x += f.vx * dt; f.y += f.vy * dt;
    const r = radius(f.tier);
    if (f.x < r) { f.x = r; f.vx = -f.vx * DAMP; }
    if (f.x > W - r) { f.x = W - r; f.vx = -f.vx * DAMP; }
    if (f.y > H - r) {
      f.y = H - r; f.vy = -f.vy * DAMP; f.vx *= FRICTION;
      if (Math.abs(f.vy) < 20) f.vy = 0;
    }
  }
  const dead = new Set();
  for (let i = 0; i < w.fruits.length; i++) {
    const a = w.fruits[i];
    if (dead.has(a.id)) continue;
    for (let j = i + 1; j < w.fruits.length; j++) {
      const b = w.fruits[j];
      if (dead.has(b.id) || dead.has(a.id)) continue;
      const ra = radius(a.tier), rb = radius(b.tier);
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 0.001, min = ra + rb;
      if (d >= min) continue;
      if (a.tier === b.tier && a.tier < TIERS - 1) {
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        a.tier++; a.x = mx; a.y = my;
        a.vx = (a.vx + b.vx) / 2; a.vy = -40;
        dead.add(b.id);
        merges.push({ tier: a.tier, x: mx, y: my });
        continue;
      }
      const nx = dx / d, ny = dy / d, overlap = min - d;
      const ma = ra * ra, mb = rb * rb, tm = ma + mb;
      a.x -= nx * overlap * (mb / tm); a.y -= ny * overlap * (mb / tm);
      b.x += nx * overlap * (ma / tm); b.y += ny * overlap * (ma / tm);
      const vn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      if (vn < 0) {
        const imp = -(1 + REST) * vn / (1 / ma + 1 / mb);
        a.vx -= imp * nx / ma; a.vy -= imp * ny / ma;
        b.vx += imp * nx / mb; b.vy += imp * ny / mb;
      }
    }
  }
  if (dead.size) w.fruits = w.fruits.filter(f => !dead.has(f.id));
  return { merges };
}

function overflowing(w) {
  return w.fruits.some(f =>
    f.y - radius(f.tier) < DANGER_Y && Math.abs(f.vy) < 8 && Math.abs(f.vx) < 8);
}

function randTier(rnd) {
  const r = rnd() * 100;
  return r < 30 ? 0 : r < 55 ? 1 : r < 75 ? 2 : r < 90 ? 3 : 4;
}

// --- Dünya Ağacı: enerji ekonomisi ---
const MAX_LEVEL = 12;
const levelCost = l => Math.round(10 * Math.pow(1.5, l));
const energyFor = tier => Math.pow(2, Math.max(0, tier - 1));

function newTree(seed) { return { level: 0, energy: 0, seed: seed >>> 0, legend: 0 }; }

// Enerji ekler; her seviye atlayışı için {kind:'levelup', level} olayı döndürür.
// MAX seviyeden sonra taşan enerji legend sayacına akar.
function addEnergy(t, pts) {
  const events = [];
  t.energy += pts;
  while (t.level < MAX_LEVEL && t.energy >= levelCost(t.level)) {
    t.energy -= levelCost(t.level);
    t.level++;
    events.push({ kind: 'levelup', level: t.level });
  }
  if (t.level >= MAX_LEVEL && t.energy > 0) { t.legend += t.energy; t.energy = 0; }
  return events;
}

const IDLE_RATE_PER_H = 6, IDLE_CAP = 60;
function idleEnergy(elapsedMs) {
  return Math.max(0, Math.min(IDLE_CAP, Math.floor(elapsedMs / 3600000) * IDLE_RATE_PER_H));
}

// --- Ağaç topolojisi: tohumdan deterministik dal iskeleti ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Dallar: {x1,y1,x2,y2,w,depth} — koordinatlar 100x108 viewBox, kök (50,104)'ten yukarı
function treeTopology(seed, maxDepth = 7) {
  const rnd = mulberry32(seed >>> 0);
  const branches = [];
  const grow = (x, y, ang, len, w, d) => {
    const x2 = x + Math.cos(ang) * len, y2 = y - Math.sin(ang) * len;
    branches.push({ x1: x, y1: y, x2, y2, w, depth: d });
    if (d >= maxDepth) return;
    const n = d === 0 ? 3 : (rnd() < 0.8 ? 2 : 3);
    for (let i = 0; i < n; i++) {
      const spread = 0.5 + rnd() * 0.35;
      const na = ang + (i - (n - 1) / 2) * spread + (rnd() - 0.5) * 0.22;
      grow(x2, y2, na, len * (0.66 + rnd() * 0.12), Math.max(0.5, w * 0.6), d + 1);
    }
  };
  grow(50, 104, Math.PI / 2, 24, 6.5, 0);
  return branches;
}

// Seviye → görünür dal derinliği (çift seviyeler yeni kohort açar)
const visibleDepth = level => 1 + Math.floor(level / 2);

// --- Persistence ---
const STATE_KEY = 'bahce-suika-v2';

function defaultState() {
  return { fruits: [], queue: [0, 1], score: 0, best: 0, tree: newTree(123456789),
           lastSeen: 0, muted: false, runEnergy: 0 };
}
function serialize(st) { return JSON.stringify(st); }
function deserialize(json) {
  try {
    const o = JSON.parse(json);
    if (!o || typeof o !== 'object' || Array.isArray(o)) return defaultState();
    const st = Object.assign(defaultState(), o);
    const okFruit = f => f && typeof f === 'object' &&
      Number.isInteger(f.tier) && f.tier >= 0 && f.tier < TIERS &&
      Number.isFinite(f.x) && Number.isFinite(f.y);
    if (!Array.isArray(st.fruits) || !st.fruits.every(okFruit)) st.fruits = [];
    else st.fruits = st.fruits.map(f => ({ tier: f.tier, x: f.x, y: f.y }));
    if (!Array.isArray(st.queue) || st.queue.length !== 2 ||
        !st.queue.every(t => Number.isInteger(t) && t >= 0 && t <= 4)) st.queue = [0, 1];
    st.tree = Object.assign(newTree(123456789), o.tree);
    const t = st.tree;
    if (!Number.isInteger(t.level) || t.level < 0 || t.level > MAX_LEVEL) t.level = 0;
    if (!Number.isInteger(t.energy) || t.energy < 0) t.energy = 0;
    if (!Number.isInteger(t.legend) || t.legend < 0) t.legend = 0;
    if (!Number.isInteger(t.seed)) t.seed = 123456789;
    return st;
  } catch { return defaultState(); }
}

const CORE = { W, H, DANGER_Y, TIERS, radius, newWorld, addFruit, stepWorld, overflowing, randTier,
               MAX_LEVEL, levelCost, energyFor, newTree, addEnergy, idleEnergy, IDLE_RATE_PER_H, IDLE_CAP,
               mulberry32, treeTopology, visibleDepth,
               STATE_KEY, defaultState, serialize, deserialize };
/* CORE-END */
window.CORE = CORE;
</script>
<script>
const C = window.CORE;
const $ = s => document.querySelector(s);
const SVGNS = 'http://www.w3.org/2000/svg';

let state = C.deserialize(localStorage.getItem(C.STATE_KEY));
if (!localStorage.getItem(C.STATE_KEY)) state.tree.seed = (Math.random() * 4294967296) >>> 0;
let world = C.newWorld();
for (const f of state.fruits) C.addFruit(world, f.tier, f.x, f.y);

function save() {
  state.fruits = world.fruits.map(f => ({ tier: f.tier, x: f.x, y: f.y }));
  localStorage.setItem(C.STATE_KEY, C.serialize(state));
}
// anime.js yoksa zarif düşüş: uç değerleri animasyonsuz uygula
const hasAnime = () => typeof window.anime === 'function';

// --- Kap render ---
const FRUIT_ART = ['🟤','🌱','🌿','🌷','🌸','🌺','🍎','🪴','🌳','🪷','⛲'];
const fruitBg = t => `radial-gradient(circle at 35% 30%, hsl(${100 - t * 9}, ${45 + t * 4}%, ${90 - t * 3}%), hsl(${100 - t * 9}, ${40 + t * 4}%, ${74 - t * 2}%))`;
const cup = $('#cup');
let fruitEls = new Map();
let px = 1;

function layoutCup() {
  px = cup.clientWidth / C.W;
  $('#danger').style.top = (C.DANGER_Y * px) + 'px';
}
addEventListener('resize', layoutCup);

function styleFruit(el, tier) {
  const d = C.radius(tier) * 2 * px;
  el.style.width = el.style.height = d + 'px';
  el.style.fontSize = (d * 0.55) + 'px';
  el.style.background = fruitBg(tier);
  el.textContent = FRUIT_ART[tier];
  el.dataset.tier = tier;
}
function updateFruitEls() {
  const seen = new Set();
  for (const f of world.fruits) {
    seen.add(f.id);
    let el = fruitEls.get(f.id);
    if (!el) {
      el = document.createElement('div');
      el.className = 'fruit born';
      el.addEventListener('animationend', e => el.classList.remove(e.animationName === 'fpop' ? 'pop' : 'born'));
      styleFruit(el, f.tier);
      cup.appendChild(el);
      fruitEls.set(f.id, el);
    }
    if (+el.dataset.tier !== f.tier) {
      styleFruit(el, f.tier);
      el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
    }
    const r = C.radius(f.tier);
    el.style.transform = `translate(${(f.x - r) * px}px, ${(f.y - r) * px}px)`;
  }
  for (const [id, el] of fruitEls) if (!seen.has(id)) { el.remove(); fruitEls.delete(id); }
}

// --- Nişancı + kuyruk ---
let aimX = 50, heldX = 50, canDrop = true, gameOverShown = false;
const held = $('#held');
function updateAim() {
  const t = state.queue[0], d = C.radius(t) * 2 * px;
  held.style.width = held.style.height = d + 'px';
  held.style.fontSize = (d * 0.55) + 'px';
  held.style.background = fruitBg(t);
  held.textContent = FRUIT_ART[t];
  held.style.opacity = canDrop && !gameOverShown ? 1 : 0.35;
  const [cur, nxt] = state.queue;
  const setNx = (id, t2) => { const e = $(id); e.style.background = fruitBg(t2); e.textContent = FRUIT_ART[t2]; };
  setNx('#nx-cur', cur); setNx('#nx-next', nxt);
  positionHeld();
}
function positionHeld() {
  const r = C.radius(state.queue[0]);
  const x = Math.max(r, Math.min(C.W - r, heldX));
  $('#aim').style.left = (x * px) + 'px';
  held.style.left = ((x - r) * px) + 'px';
  held.style.top = (2 * px) + 'px';
}
function drop() {
  if (!canDrop || gameOverShown) return;
  const tier = state.queue.shift();
  state.queue.push(C.randTier(Math.random));
  C.addFruit(world, tier, heldX);
  canDrop = false;
  setTimeout(() => { canDrop = true; updateAim(); }, 400);
  save();
  updateAim();
}

// --- Oyun döngüsü ---
const DT = 1 / 120;
let last = 0, acc = 0, dangerSince = null, rafSeen = false;
function frame(ts) {
  rafSeen = true;
  const t = ts / 1000;
  const fdt = Math.min(0.05, t - (last || t)); last = t;
  acc += fdt;
  heldX += (aimX - heldX) * (1 - Math.exp(-16 * fdt));
  positionHeld();
  const merges = [];
  while (acc >= DT) { merges.push(...C.stepWorld(world, DT).merges); acc -= DT; }
  if (merges.length) handleMerges(merges);
  updateFruitEls();
  if (!gameOverShown && C.overflowing(world)) {
    if (dangerSince === null) dangerSince = t;
    cup.classList.add('danger');
    if (t - dangerSince > 2) showGameOver();
  } else { dangerSince = null; cup.classList.remove('danger'); }
  requestAnimationFrame(frame);
}

function handleMerges(merges) {
  for (const m of merges) {
    state.score += m.tier * (m.tier + 1);
    state.best = Math.max(state.best, state.score);
    const pts = C.energyFor(m.tier);
    state.runEnergy += pts;
    const events = C.addEnergy(state.tree, pts);
    flyMote(m, pts, events);
    playChime2(m.tier);
  }
  updateHud();
  touchLastSeen();
}
function updateHud() { $('#score').textContent = state.score; $('#best').textContent = state.best; }

function startRun() {
  world = C.newWorld();
  for (const [, el] of fruitEls) el.remove();
  fruitEls.clear();
  state.queue = [C.randTier(Math.random), C.randTier(Math.random)];
  state.score = 0;
  state.runEnergy = 0;
  gameOverShown = false;
  dangerSince = null;
  cup.classList.remove('danger');
  save();
  updateHud();
  updateAim();
}

function showGameOver() {
  gameOverShown = true;
  showOverlay(
    'Kap taştı 🌾',
    `Skor: ${state.score}. Bu koşuda ağacına ${state.runEnergy} enerji akıttın — ağacın kalıcı, hiçbir şey kaybolmadı.`,
    'Yeni koşu',
    startRun
  );
}

// --- Dünya Ağacı render ---
const LEVEL_NAMES = ['Tohum','Filiz','Fidan','Körpe Ağaç','Genç Ağaç','Çiçekli Ağaç','Serpilen Ağaç',
                     'Meyveli Ağaç','Gür Ağaç','Yaşlı Bilge','Ulu Ağaç','Kadim Ağaç','Dünya Ağacı'];
const INHABITANTS = [[2,'🦋','flutter'],[4,'🐦',''],[6,'🐿️',''],[8,'🐝','flutter'],[10,'🍄',''],[12,'🏠','']];
let topoCache = null, topoSeed = null;
function topology() {
  if (topoSeed !== state.tree.seed) { topoCache = C.treeTopology(state.tree.seed); topoSeed = state.tree.seed; }
  return topoCache;
}
const treeScale = level => 0.55 + level * 0.0375;

function renderTree(animDepth) {
  const scaleG = $('#tree-g'), g = $('#tree-sway');
  g.innerHTML = '';
  const lvl = state.tree.level;
  const vd = C.visibleDepth(lvl);
  const sc = treeScale(lvl);
  scaleG.setAttribute('transform', `translate(${50 * (1 - sc)} ${104 * (1 - sc)}) scale(${sc})`);
  $('#tree-shadow').setAttribute('rx', 14 + lvl * 2.4);   // gölge ağaçla büyür → ilerleme zeminden de okunur
  const topo = topology();
  const vis = topo.filter(b => b.depth <= vd);
  const newOnes = [];
  // dallar
  for (const b of vis) {
    const ln = document.createElementNS(SVGNS, 'line');
    ln.setAttribute('x1', b.x1); ln.setAttribute('y1', b.y1);
    ln.setAttribute('x2', b.x2); ln.setAttribute('y2', b.y2);
    ln.setAttribute('stroke', 'url(#barkgrad)');
    ln.setAttribute('stroke-width', b.w);
    ln.setAttribute('stroke-linecap', 'round');
    g.appendChild(ln);
    if (animDepth !== undefined && b.depth === animDepth) {
      const len = Math.hypot(b.x2 - b.x1, b.y2 - b.y1);
      ln.setAttribute('stroke-dasharray', len);
      ln.setAttribute('stroke-dashoffset', len);
      newOnes.push([ln, len]);
    }
  }
  // yaprak kümeleri: en derin görünür iki kademenin uçları
  const rnd = C.mulberry32(state.tree.seed ^ 0x9e3779b9);
  const tips = topo.filter(b => b.depth === vd || (vd > 1 && b.depth === vd - 1 && lvl >= 3));
  const leafR = 3 + lvl * 0.45;
  for (const b of tips) {
    for (let i = 0; i < 3; i++) {
      const c = document.createElementNS(SVGNS, 'circle');
      c.setAttribute('cx', b.x2 + (rnd() - 0.5) * leafR * 1.6);
      c.setAttribute('cy', b.y2 + (rnd() - 0.5) * leafR * 1.2);
      c.setAttribute('r', leafR * (0.55 + rnd() * 0.5) * (b.depth === vd ? 1 : 0.7));
      c.setAttribute('fill', 'url(#leafgrad)');
      c.setAttribute('opacity', 0.9);
      c.classList.add('leaf');
      if (rnd() < 0.4) {   // yaprak pırıltısı: rastgele kümeler nefes alır
        c.classList.add('shimmer');
        c.style.animationDuration = (3 + rnd() * 3) + 's';
        c.style.animationDelay = (rnd() * 4) + 's';
      }
      g.appendChild(c);
    }
    // çiçekler / meyveler
    if (lvl >= 5 && rnd() < 0.5) {
      const f = document.createElementNS(SVGNS, 'circle');
      f.setAttribute('cx', b.x2 + (rnd() - 0.5) * leafR);
      f.setAttribute('cy', b.y2 + (rnd() - 0.5) * leafR);
      f.setAttribute('r', lvl >= 7 && rnd() < 0.5 ? 1.3 : 0.9);
      f.setAttribute('fill', lvl >= 7 && rnd() < 0.5 ? '#e25545' : '#f8a8c8');
      g.appendChild(f);
    }
  }
  // yeni dalların çizilerek belirmesi
  if (newOnes.length && hasAnime()) {
    anime({ targets: newOnes.map(n => n[0]), strokeDashoffset: [anime.setDashoffset, 0],
            duration: 800, delay: anime.stagger(60), easing: 'easeOutCubic' });
  } else for (const [ln] of newOnes) ln.removeAttribute('stroke-dashoffset');
  renderInhabitants(vd);
  renderChips();
  renderAmbient(lvl);
}

function renderInhabitants(vd) {
  document.querySelectorAll('.inhab').forEach(e => e.remove());
  const wrap = $('#tree-wrap');
  const topo = topology();
  const tips = topo.filter(b => b.depth === Math.max(1, vd - 1));
  const sc = treeScale(state.tree.level);
  const rnd = C.mulberry32(state.tree.seed ^ 0x51ab3e);
  let ti = 0;
  for (const [minLvl, glyph, cls] of INHABITANTS) {
    if (state.tree.level < minLvl) continue;
    const b = tips[Math.floor(rnd() * tips.length)] || topo[0];
    const el = document.createElement('div');
    el.className = 'inhab ' + (cls || 'bob');
    el.style.animationDelay = (ti * 0.9) + 's';

    el.style.fontSize = (13 + ti) + 'px';

    el.style.left = (50 + (b.x2 * sc + 50 * (1 - sc) - 50)) + '%';
    el.style.top = ((b.y2 * sc + 104 * (1 - sc)) / 108 * 100) + '%';
    wrap.appendChild(el);
    ti++;
  }
}

function renderChips() {

function renderAmbient(lvl) {
  const wrap = $('#tree-wrap');

  if (stage === 3) {

function flyMote(m, pts, events) {
  const cr = cup.getBoundingClientRect();
  const sx = cr.left + m.x / C.W * cr.width, sy = cr.top + m.y / C.H * cr.height;

// --- Ses ---
let _ctx = null;
function audioCtx() {
  if (!_ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _ctx = new AC(); startAmbient();
  }
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
const SCALE = [523.25, 587.33, 659.25, 783.99, 880, 1046.5];

function playChime2(tier) {
  if (state.muted) return;
  const ctx = audioCtx();
  if (!ctx) return;
  const t = ctx.currentTime;
  const idx = Math.min(5, Math.max(0, tier - 4));
  const notes = [SCALE[idx]];
  const vol = tier >= 4 ? 0.18 : 0.07;
  notes.forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t + i * 0.12);
    g.gain.exponentialRampToValueAtTime(vol, t + i * 0.12 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.12 + 0.45);
    o.connect(g).connect(ctx.destination);
    o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.5);
  });
}
function playFanfare() {
  if (state.muted) return;
  const ctx = audioCtx();
  if (!ctx) return;
  const t = ctx.currentTime;
  [SCALE[2], SCALE[3], SCALE[5]].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t + i * 0.11);
    g.gain.exponentialRampToValueAtTime(0.2, t + i * 0.11 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.11 + 0.6);
    o.connect(g).connect(ctx.destination);
    o.start(t + i * 0.11); o.stop(t + i * 0.11 + 0.65);
  });
}

let ambientNodes = null;
function startAmbient() {
  if (ambientNodes || !_ctx) return;
  const ctx = _ctx;
  const len = 2 * ctx.sampleRate;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 400;
  const g = ctx.createGain(); g.gain.value = state.muted ? 0 : 0.015;
  src.connect(lp).connect(g).connect(ctx.destination); src.start();
  ambientNodes = { gain: g };
  scheduleChirp();
}
function scheduleChirp() {
  setTimeout(() => {
    if (_ctx && !state.muted) {
      const t = _ctx.currentTime;
      const o = _ctx.createOscillator(), g = _ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(2200 + Math.random() * 800, t);
      o.frequency.exponentialRampToValueAtTime(1600 + Math.random() * 600, t + 0.12);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.04, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
      o.connect(g).connect(_ctx.destination); o.start(t); o.stop(t + 0.2);
    }
    scheduleChirp();
  }, 2500 + Math.random() * 6000);
}

      save();
      renderChips();
      const ups = events.filter(e => e.kind === 'levelup');
      if (ups.length) celebrate(ups[ups.length - 1].level);
    };
    bar.appendChild(b);
  }
  const reset = document.createElement('button');
  reset.textContent = 'SIFIRLA';
  reset.onclick = () => { wiping = true; localStorage.removeItem(C.STATE_KEY); location.reload(); };
  bar.appendChild(reset);
  document.body.appendChild(bar);
}
</script>
</body>
</html>
